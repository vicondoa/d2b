name: pr-cargo-workspace
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

# This workflow is superseded by pr-l1-static-fast/test-rust + test-proofs.
# Kept temporarily for comparison; will be removed after validation.
jobs:
  cargo-ubuntu:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Cargo workspace gate (via make)
        run: |
          make test-rust
          make test-proofs
