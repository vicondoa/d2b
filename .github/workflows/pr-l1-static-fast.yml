name: pr-l1-static-fast
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  tier0:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Tier 0 first-pass gate
        run: make check-tier0
      - name: ADR index coverage guard
        run: bash tests/unit/meta/adr-index-coverage.sh
      - name: CI coverage structural guard
        run: bash tests/unit/meta/ci-coverage.sh
      - name: Test rearchitecture fail-closed gates
        run: |
          bash tests/tools/gen-migration-ledger.sh --check
          bash tests/unit/meta/ci-uses-make.sh

  # Run L1 sub-targets in parallel for faster CI. Locally, `make test-unit`
  # runs them serially as an umbrella.
  test-lint:
    needs: tier0
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Lint gate (preflight + parse + shellcheck)
        run: make test-lint

  test-changelog:
    if: github.event_name == 'pull_request'
    needs: tier0
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Changelog policy gate
        run: bash scripts/changelog-check.sh

  test-rust:
    needs: tier0
    runs-on: ubuntu-latest
    # Warm (rust-cache hit): ~8-12 min. Cold (no cache): ~43 min.
    timeout-minutes: 60
    env:
      # Disable sccache in CI — we use Swatinem/rust-cache (target-dir
      # caching) instead, which caches ALL compiled artifacts including
      # proc-macros and bin/lib crates that sccache cannot cache (~60% of
      # compilations are "non-cacheable" by sccache due to crate-type).
      # CARGO_INCREMENTAL=0 is still set: incremental compilation artifacts
      # are non-deterministic and bloat the cache without benefit for CI
      # (each PR run starts from a different commit).
      CARGO_INCREMENTAL: "0"
      # Override the repo .cargo/config.toml rustc-wrapper (sccache) so
      # rust-cache's post-step `cargo metadata` doesn't fail looking for
      # an sccache binary that isn't installed.
      CARGO_BUILD_RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Install pinned Rust toolchain + ripgrep + acl
        # MUST run BEFORE Swatinem/rust-cache: the cache action reads
        # `rustc --version` to compute its key hash, so the pinned
        # toolchain must be the active default when the cache step runs.
        # Without this, the runner's pre-installed 1.96.0 is hashed,
        # and the cache is keyed on the wrong compiler version.
        run: |
          PINNED=$(sed -n 's/^[[:space:]]*channel[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' packages/rust-toolchain.toml | head -1)
          rustup toolchain install "$PINNED" --profile minimal --component rustfmt --component clippy
          rustup default "$PINNED"
          echo "Rust toolchain: $(rustc --version)"
          sudo apt-get update && sudo apt-get install -y ripgrep acl
      - name: Rust dependency cache (target dirs + cargo registry)
        # Swatinem/rust-cache caches dependency artifacts in target dirs
        # and the cargo registry. It performs all I/O in its own action
        # process (JavaScript pre/post steps) via @actions/cache — no
        # ACTIONS_RUNTIME_TOKEN or cache credentials are exposed to `run:`
        # steps where untrusted crate code (build scripts, proc-macros,
        # `cargo test`) executes.
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          workspaces: |
            packages -> target
            packages/nixling-priv-broker -> target
          cache-directories: |
            packages/nixling-priv-broker/target-layer1
            packages/nixling-priv-broker/target-fakebackends
          prefix-key: "v0-rust"
          shared-key: "test-rust-${{ runner.os }}"
          save-if: "true"
      - name: Rust workspace gate
        # Skip the fixture nix-build (~35 min) in hosted PR CI. The lightweight
        # fixture-smoke shard still instantiates in the flake matrix; the
        # feature-rich fixture-smoke-full graph is validated by local
        # pre-PR `make test-unit` because hosted-runner instantiate shards have
        # repeatedly tripped Nix evaluator segfaults before producing typed
        # eval errors.
        env:
          NL_SKIP_FIXTURE_BUILD: "1"
        run: make test-rust

  test-proofs:
    needs: tier0
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Proof crates gate
        run: make test-proofs

  # ---------------------------------------------------------------------------
  # Sharded x86_64 flake check. The monolithic `nix flake check` evaluated every
  # nixosSystem toplevel (eval-minimal/multi-env/graphics/observability/daemon +
  # fixture-smoke + nix-unit) in ONE evaluator process, OOM-killing the 16 GB
  # runner (~41 min once we backed it with a 14 GB swapfile to survive). Instead
  # we enumerate the checks and instantiate each in its OWN runner/process, in
  # parallel, plus a `flake-eval-x86-outputs` job for the non-`checks` outputs.
  # The aarch64 leg is intentionally lightweight: it evaluates the dedicated
  # multi-arch smoke expression only, not the full aarch64 flake check. A
  # fail-closed drift gate (tests/unit/gates/flake-check-matrix-sync.sh, via
  # `make test-drift`) keeps the x86 matrix and the aarch64 smoke wiring in
  # sync with this policy.
  # ---------------------------------------------------------------------------
  flake-eval-discover:
    needs: tier0
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      checks: ${{ steps.list.outputs.checks }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
      - id: list
        name: Enumerate flake checks (x86_64-linux)
        run: |
          checks=$(make -s test-flake-list)
          echo "discovered checks: $checks"
          echo "checks=$checks" >> "$GITHUB_OUTPUT"

  flake-eval-x86:
    needs: flake-eval-discover
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        check: ${{ fromJSON(needs.flake-eval-discover.outputs.checks) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Add swap (insurance for the heaviest single check)
        run: |
          # A single check instantiates in its own process and fits a 16 GB
          # runner (heaviest measured ~12 GB), so unlike the old monolith this
          # rarely touches swap. Add a modest swapfile purely as OOM insurance.
          SWAP=/mnt/nixling-ci-swap
          sudo swapoff "$SWAP" 2>/dev/null || true
          sudo rm -f "$SWAP"
          sudo fallocate -l 8G "$SWAP" || sudo dd if=/dev/zero of="$SWAP" bs=1M count=8192
          sudo chmod 600 "$SWAP"
          sudo mkswap "$SWAP"
          sudo swapon "$SWAP"
      - uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Flake check shard (x86_64-linux)
        # NL_FLAKE_CHECK is passed via the step environment, NOT interpolated
        # into the shell command: a flake check attr name is PR-controlled, so
        # `NL_FLAKE_CHECK='${{ matrix.check }}' ...` would be a shell-injection
        # vector. test-flake.sh additionally rejects names outside [A-Za-z0-9._-].
        env:
          NL_FLAKE_CHECK: ${{ matrix.check }}
        run: make test-flake

  # x86_64 non-`checks` flake outputs (packages, …). The per-check shards above
  # only cover `checks.x86_64-linux.*`; `nix flake check` also validates the
  # other per-system outputs. The aarch64 leg is a smoke eval only, so without
  # this an x86-only broken package output could slip past the required
  # `test-flake-x86` context. Single light job (no nixosSystem toplevels).
  flake-eval-x86-outputs:
    needs: tier0
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Flake non-checks outputs (x86_64-linux)
        env:
          NL_FLAKE_OUTPUTS: "1"
        run: make test-flake

  # Stable required-context aggregator: branch protection requires the
  # `test-flake-x86` check, and a dynamic matrix cannot itself be a required
  # context. This job succeeds only when discovery, every shard, and the
  # non-checks outputs job all succeeded.
  test-flake-x86:
    needs: [flake-eval-discover, flake-eval-x86, flake-eval-x86-outputs]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require all x86 flake jobs to pass
        run: |
          discover='${{ needs.flake-eval-discover.result }}'
          shards='${{ needs.flake-eval-x86.result }}'
          outputs='${{ needs.flake-eval-x86-outputs.result }}'
          echo "flake-eval-discover=$discover  flake-eval-x86=$shards  flake-eval-x86-outputs=$outputs"
          if [ "$discover" = success ] && [ "$shards" = success ] && [ "$outputs" = success ]; then
            echo "All x86_64-linux flake checks + outputs passed."
          else
            echo "::error::x86_64 flake gate failed (discover=$discover, shards=$shards, outputs=$outputs)"
            exit 1
          fi

  test-flake-aarch64:
    needs: tier0
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: aarch64 smoke eval
        run: |
          nix-instantiate --eval --strict \
            -E 'let f = import ./tests/unit/smoke/smoke-eval-aarch64.nix; r = f {}; in r.drvPath' \
            >/dev/null

  test-drift:
    needs: tier0
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Drift gate
        run: make test-drift

  test-policy:
    needs: tier0
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Policy meta-gates
        run: make test-policy
