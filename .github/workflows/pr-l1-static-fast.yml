name: pr-l1-static-fast
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  tier0:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Tier 0 first-pass gate
        run: make check-tier0
      - name: ADR index coverage guard
        run: bash tests/adr-index-coverage.sh
      - name: CI coverage structural guard
        run: bash tests/ci-coverage.sh
      - name: Test rearchitecture fail-closed gates
        run: |
          bash tests/tools/gen-migration-ledger.sh --check
          bash tests/ci-uses-make.sh

  static-fast:
    needs: tier0
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Static fast regression gate
        run: make check-fast
