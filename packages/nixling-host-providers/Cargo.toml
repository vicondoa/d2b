[package]
name = "nixling-host-providers"
version = "0.0.0-bootstrap"
edition = "2021"
publish = false
license.workspace = true

[lib]
doctest = false

[lints]
workspace = true

# Host-side provider adapters (ADR 0032): LocalMicroVmProvider
# (RuntimeProvider) and LocalCrossDomainWaylandProvider (DisplayProvider),
# behavior-preserving wrappers over the existing nixling-host argv/plan
# generators. This crate legitimately depends on nixling-host (it is the
# host adapter); the dependency-direction gate does NOT treat it as a pure
# contract crate, so the provider TRAIT crates never gain a host edge.
[dependencies]
nixling-constellation-core = { path = "../nixling-constellation-core" }
nixling-constellation-provider = { path = "../nixling-constellation-provider" }
nixling-host = { path = "../nixling-host", version = "0.0.0-bootstrap" }
async-trait = "0.1"
tokio = { version = "1", features = ["rt"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
