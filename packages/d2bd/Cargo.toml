[package]
name = "d2bd"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
publish = false
license.workspace = true

[lints]
workspace = true

[dependencies]
arc-swap = "1"
async-trait.workspace = true
clap = { version = "4.5", features = ["derive"] }
getrandom = "0.2"
libc = "0.2"
nix = { version = "0.29", features = ["fs", "socket", "uio", "user", "signal", "process", "poll"] }
parking_lot = { version = "0.12", features = ["arc_lock"] }
rustix = { workspace = true }
d2b-core = { workspace = true }
d2b-host = { workspace = true }
d2b-contracts = { workspace = true, features = ["unsafe-local"] }
# v2 constellation contract crates (ADR 0032). The peer-module skeletons in
# src/realm_stubs.rs wire this trait surface; they are compile-only
# and NOT called from the running daemon (zero behavior change).
d2b-realm-core = { workspace = true }
d2b-realm-provider = { workspace = true }
d2b-realm-router = { workspace = true }
d2b-gateway = { workspace = true }
d2b-gateway-runtime = { workspace = true }
d2b-provider-aca = { workspace = true }
d2b-provider-relay = { workspace = true }
protobuf.workspace = true
semver = "1"
serde.workspace = true
sha2.workspace = true
tracing = "0.1"
# v1.1.1 live-deploy fu9: stderr tracing subscriber for d2bd
# so RUST_LOG=debug actually surfaces in journalctl. Without this
# the daemon initializes no subscriber and every `tracing::error!`
# call (e.g. InternalIo detail) is silently dropped, making live
# debugging impossible.
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
serde_json.workspace = true
socket2 = "0.5"
subtle = "2.6"
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "signal", "sync", "time", "net"] }
ttrpc = { workspace = true, default-features = false, features = ["async", "sync"] }
uzers = "0.12"

[dev-dependencies]
d2b-core = { workspace = true, features = ["test-support"] }
regex = "1"
tempfile = "3"
