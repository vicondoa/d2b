[package]
name = "d2b-session"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[features]
default = []

[dependencies]
async-trait.workspace = true
d2b-contracts = { workspace = true, default-features = false, features = ["v2-component-session", "v2-services"] }
futures-util.workspace = true
protobuf.workspace = true
sha2.workspace = true
snow.workspace = true
tokio = { workspace = true, features = ["io-util", "rt", "sync", "time"] }
ttrpc = { workspace = true, default-features = false, features = ["async"] }

[lints]
workspace = true

[dev-dependencies]
serde_json.workspace = true
tokio = { workspace = true, features = ["macros", "rt", "test-util"] }
