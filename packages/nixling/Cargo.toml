[package]
name = "nixling"
version = "0.0.0-bootstrap"
edition = "2024"
publish = false
license.workspace = true

[lints]
workspace = true

[dependencies]
clap = { version = "4", features = ["derive"] }
nix = { version = "0.29", default-features = false, features = ["socket", "user", "signal"] }
nixling-core = { path = "../nixling-core", version = "0.0.0-bootstrap" }
nixling-ipc = { path = "../nixling-ipc", version = "0.0.0-bootstrap" }
nixling-constellation-core = { path = "../nixling-constellation-core", version = "0.0.0-bootstrap" }
nixling-constellation-router = { path = "../nixling-constellation-router", version = "0.0.0-bootstrap" }
rustix = { workspace = true }
schemars.workspace = true
serde.workspace = true
serde_json.workspace = true
sha2 = { workspace = true }

[dev-dependencies]
tempfile = "3"
