[package]
name = "d2b-gateway"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
publish = false
license.workspace = true

[lib]
doctest = false

[lints]
workspace = true

# Gateway-mode display-session orchestrator (ADR 0032, P0). Composes the
# proven providers (d2b-provider-aca WorkloadProvider + d2b-provider-
# relay TransportProvider + an operator-session Waypipe display runner) into a
# session-credential-bound display session. The session credential (a
# gateway-minted one-shot HMAC binding) is what admits display bytes — Azure
# Relay / the sandbox managed identity stay reachability-only. Pure-logic cores
# (handshake, ledger, state machine) are injected-deps testable with mocks; no
# live Azure in unit tests. Host-side leaf crate: nothing in the constellation
# contract crates depends on it (dep-direction gate).
[dependencies]
d2b-realm-core = { workspace = true }
async-trait.workspace = true
hmac = "0.12"
sha2.workspace = true
serde = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "macros"] }

