[package]
name = "d2b-guestd"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
publish = false
license.workspace = true

[lints]
workspace = true

[dependencies]
async-trait.workspace = true
futures = "0.3"
hmac = "0.12"
d2b-contracts = { workspace = true, features = ["guest"] }
d2b-exec-runner = { workspace = true }
d2b-realm-core = { workspace = true }
d2b-session = { workspace = true, default-features = false }
protobuf.workspace = true
rustix = { workspace = true }
sha2 = { workspace = true }
tokio = { workspace = true, default-features = false, features = ["io-util", "macros", "process", "rt-multi-thread", "signal", "sync", "time"] }
tokio-vsock = "0.7.2"
ttrpc = { workspace = true, default-features = false, features = ["async", "sync"] }

[dev-dependencies]
# `test-util` enables tokio's mock clock (`start_paused` / `time::advance`) used
# by the interactive-exec runtime-ceiling tests; dev-only so the shipped daemon
# never carries the test clock.
tokio = { workspace = true, features = ["test-util"] }
