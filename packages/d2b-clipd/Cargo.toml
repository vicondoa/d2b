[package]
name = "d2b-clipd"
version = "0.0.0-bootstrap"
edition = "2024"
publish = false
license.workspace = true
description = "Host-session clipboard authority daemon for d2b"

[lints]
workspace = true

[dependencies]
env_logger = "0.11"
log = "0.4"
notify-rust = "4"
rustix = { workspace = true, features = ["event", "fs", "pipe", "process", "net"] }
serde.workspace = true
serde_json.workspace = true
thiserror = "2"
wayland-client = "0.31"
wayland-protocols = { version = "0.32", features = ["client", "staging"] }
wayland-protocols-wlr = { version = "0.3", features = ["client"] }
