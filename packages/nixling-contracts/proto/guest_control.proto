syntax = "proto3";

package nixling.guest.v1;

// Guest-control ttRPC service. All exec I/O methods are unary chunked RPCs:
// callers use offsets, request ids, and bounded chunks instead of ttRPC
// streaming for stdin/stdout/stderr.
service GuestControl {
  rpc Hello(HelloRequest) returns (HelloResponse);
  rpc Authenticate(AuthenticateRequest) returns (AuthenticateResponse);
  rpc Capabilities(CapabilitiesRequest) returns (CapabilitiesResponse);
  rpc Health(HealthRequest) returns (HealthResponse);

  rpc ExecCreate(ExecCreateRequest) returns (ExecCreateResponse);
  rpc ExecInspect(ExecInspectRequest) returns (ExecInspectResponse);
  rpc ExecWait(ExecWaitRequest) returns (ExecWaitResponse);
  rpc ExecLogs(ExecLogsRequest) returns (ExecLogsResponse);
  rpc ExecList(ExecListRequest) returns (ExecListResponse);

  rpc WriteStdin(WriteStdinRequest) returns (WriteStdinResponse);
  rpc ReadOutput(ReadOutputRequest) returns (ReadOutputResponse);
  rpc CloseStdin(CloseStdinRequest) returns (CloseStdinResponse);
  rpc TtyWinResize(TtyWinResizeRequest) returns (ControlAck);
  rpc ExecSignal(ExecSignalRequest) returns (ControlAck);
  rpc ExecCancel(ExecCancelRequest) returns (ControlAck);

  rpc ShellAttach(ShellAttachRequest) returns (ShellAttachResponse);
  rpc ShellList(ShellListRequest) returns (ShellListResponse);
  rpc ShellDetach(ShellDetachRequest) returns (ShellDetachResponse);
  rpc ShellKill(ShellKillRequest) returns (ShellKillResponse);
  rpc ShellCloseAttach(ShellCloseAttachRequest) returns (ShellDetachResponse);
  rpc TerminalWriteStdin(TerminalWriteStdinRequest) returns (WriteStdinResponse);
  rpc TerminalReadOutput(TerminalReadOutputRequest) returns (ReadOutputResponse);
  rpc TerminalCloseStdin(TerminalCloseStdinRequest) returns (CloseStdinResponse);
  rpc TerminalTtyWinResize(TerminalTtyWinResizeRequest) returns (ControlAck);

  // Framework op (W15): read a host-declared, enum-keyed guest file in a
  // single bounded shot. Auth-gated like the exec RPCs; available whenever
  // guest-control is enabled (not gated on exec.enable). The request carries a
  // closed file-id enum, never a free-form path.
  rpc ReadGuestFile(ReadGuestFileRequest) returns (ReadGuestFileResponse);

  // Framework op: guest-side USBIP import lifecycle. The host daemon owns the
  // host bind/unbind through the broker and calls this authenticated RPC for the
  // guest attach/detach half; the CLI never SSHes into the guest for USBIP.
  rpc UsbipImport(UsbipImportRequest) returns (UsbipImportResponse);

  // Framework op: side-effect-free guest-side USBIP import observation. Auth
  // gated like UsbipImport; runs only the host-declared guest usbip binary.
  rpc UsbipStatus(UsbipStatusRequest) returns (UsbipStatusResponse);

  // Framework op: guest-root system activation inside the VM. The host sends
  // a store switch-to-configuration path and closed activation mode; guestd
  // validates both and starts a detached transient unit in the guest systemd.
  rpc ActivateSystemStart(GuestActivationStartRequest) returns (GuestActivationStartResponse);

  // Framework op: rejoinable status for an activation transient unit. Status is
  // backed by guestd root-owned /run state and never returns stdout/stderr.
  rpc ActivateSystemStatus(GuestActivationStatusRequest) returns (GuestActivationStatusResponse);
}

message RequestMetadata {
  string vm_id = 1;
  string request_id = 2;
  uint32 protocol_version = 3;
}

message ExecRequestMetadata {
  RequestMetadata common = 1;
  string exec_id = 2;
  string guest_boot_id = 3;
}

message TerminalRequestMetadata {
  RequestMetadata common = 1;
  string session_id = 2;
  string guest_boot_id = 3;
  TerminalKind kind = 4;
}

message HelloRequest {
  RequestMetadata metadata = 1;
  bytes host_nonce = 2;
  uint32 transcript_version = 3;
}

message HelloResponse {
  bytes guest_nonce = 1;
  string guest_boot_id = 2;
  uint32 protocol_version = 3;
  reserved 4, 5;
  reserved "capabilities_hash", "health";
}

message AuthenticateRequest {
  RequestMetadata metadata = 1;
  bytes host_nonce = 2;
  bytes guest_nonce = 3;
  string guest_boot_id = 4;
  uint32 transcript_version = 5;
  bytes host_auth_tag = 6;
}

message AuthenticateResponse {
  optional bytes guest_auth_tag = 1;
  optional string capabilities_hash = 2;
  HealthResponse health = 3;
  CapabilitiesResponse capabilities = 4;
  GuestControlError error = 5;
}

message CapabilitiesRequest {
  RequestMetadata metadata = 1;
}

message CapabilitiesResponse {
  uint32 protocol_version = 1;
  repeated GuestCapability capabilities = 2;
  GuestEffectiveLimits limits = 3;
}

message HealthRequest {
  RequestMetadata metadata = 1;
}

message HealthResponse {
  HealthOrigin origin = 1;
  HealthState state = 2;
  HealthReason reason = 3;
  HealthRemediation remediation = 4;
  uint32 protocol_version = 5;
  repeated GuestCapability capabilities = 6;
  repeated GuestSubsystem degraded_subsystems = 7;
}

message GuestEffectiveLimits {
  uint64 max_chunk_bytes = 1;
  uint64 max_recv_message_bytes = 2;
  uint64 decoded_write_stdin_bytes_per_connection = 3;
  uint32 write_stdin_handlers_per_connection = 4;
  uint32 stdin_queue_chunks_per_exec = 5;
  uint64 stdout_live_buffer_bytes = 6;
  uint64 stderr_live_buffer_bytes = 7;
  uint64 detached_stdout_log_bytes = 8;
  uint64 detached_stderr_log_bytes = 9;
  uint64 long_poll_timeout_ms = 10;
  uint64 slow_consumer_grace_ms = 11;
  uint32 exec_sessions_per_vm = 12;
  uint32 attached_sessions_per_vm = 13;
  uint32 pending_read_output_waits_per_stream = 14;
  uint32 pending_exec_waits_per_vm = 15;
  uint32 rpc_rate_per_connection_per_second = 16;
  uint32 rpc_rate_per_vm_burst = 17;
  uint32 shell_sessions_per_vm = 18;
  uint32 shell_attached_sessions_per_vm = 19;
}

message ExecCreateRequest {
  RequestMetadata metadata = 1;
  repeated string argv = 2;
  optional string user = 3;
  optional string cwd = 4;
  repeated EnvVar env = 5;
  bool tty = 6;
  bool stdin_open = 7;
  bool detached = 8;
  TerminalSize initial_terminal_size = 9;
  OutputPolicy output_policy = 10;
}

message EnvVar {
  string key = 1;
  string value = 2;
}

message TerminalSize {
  uint32 rows = 1;
  uint32 cols = 2;
}

message OutputPolicy {
  uint64 max_chunk_bytes = 1;
  uint64 max_stdout_log_bytes = 2;
  uint64 max_stderr_log_bytes = 3;
  uint64 slow_consumer_timeout_ms = 4;
  uint64 wait_timeout_ms = 5;
}

message ExecCreateResponse {
  optional string exec_id = 1;
  uint64 created_at_monotonic_ns = 2;
  uint64 control_seq = 3;
  uint64 stdout_cursor = 4;
  uint64 stderr_cursor = 5;
  GuestEffectiveLimits effective_limits = 6;
  ExecState state = 7;
  GuestControlError error = 8;
}

message ExecInspectRequest {
  ExecRequestMetadata metadata = 1;
}

message ExecInspectResponse {
  ExecState state = 1;
  TerminalStatus visible_terminal_status = 2;
  StdinState stdin_state = 3;
  uint64 stdout_start_offset = 4;
  uint64 stdout_end_offset = 5;
  uint64 stderr_start_offset = 6;
  uint64 stderr_end_offset = 7;
  uint64 stdout_dropped_bytes = 8;
  uint64 stderr_dropped_bytes = 9;
  bool stdout_truncated_for_retention = 10;
  bool stderr_truncated_for_retention = 11;
  uint64 last_control_seq = 12;
  uint64 state_generation = 13;
  GuestControlError error = 14;
}

message ExecWaitRequest {
  ExecRequestMetadata metadata = 1;
  uint64 timeout_ms = 2;
  optional uint64 known_state_generation = 3;
}

message ExecWaitResponse {
  ExecState state = 1;
  TerminalStatus visible_terminal_status = 2;
  uint64 state_generation = 3;
  uint64 stdout_start_offset = 4;
  uint64 stdout_end_offset = 5;
  uint64 stderr_start_offset = 6;
  uint64 stderr_end_offset = 7;
  bool timed_out = 8;
  GuestControlError error = 9;
}

message ExecLogsRequest {
  ExecRequestMetadata metadata = 1;
  OutputStream stream = 2;
  uint64 offset = 3;
  uint64 max_len = 4;
}

message ExecLogsResponse {
  OutputStream stream = 1;
  uint64 offset = 2;
  uint64 end_offset = 3;
  bytes data = 4;
  uint64 next_offset = 5;
  bool eof = 6;
  uint64 start_offset = 7;
  uint64 dropped_bytes = 8;
  bool truncated = 9;
  GuestControlError error = 10;
}

message ExecListRequest {
  RequestMetadata metadata = 1;
  string guest_boot_id = 2;
}

message ExecListResponse {
  repeated ExecListEntry entries = 1;
  GuestControlError error = 2;
}

message ExecListEntry {
  string exec_id = 1;
  uint32 slot = 2;
  ExecState state = 3;
  uint64 create_time_unix = 4;
  string argv_sha256 = 5;
  bool stdout_truncated = 6;
  bool stderr_truncated = 7;
  uint64 dropped_bytes = 8;
}

message WriteStdinRequest {
  ExecRequestMetadata metadata = 1;
  uint64 offset = 2;
  bytes data = 3;
  bool close_after = 4;
  optional uint64 client_deadline_ms = 5;
}

message WriteStdinResponse {
  uint64 accepted_offset = 1;
  uint64 accepted_len = 2;
  uint64 next_offset = 3;
  StdinState stdin_state = 4;
  uint64 blocked_ms = 5;
  WriteDisposition disposition = 6;
  GuestControlError error = 7;
}

message ReadOutputRequest {
  ExecRequestMetadata metadata = 1;
  OutputStream stream = 2;
  uint64 offset = 3;
  uint64 max_len = 4;
  bool wait = 5;
  uint64 timeout_ms = 6;
}

message ReadOutputResponse {
  OutputStream stream = 1;
  uint64 offset = 2;
  uint64 end_offset = 3;
  bytes data = 4;
  uint64 next_offset = 5;
  bool eof = 6;
  uint64 start_offset = 7;
  uint64 dropped_bytes = 8;
  bool truncated = 9;
  bool timed_out = 10;
  GuestControlError error = 11;
}

message CloseStdinRequest {
  ExecRequestMetadata metadata = 1;
  uint64 offset = 2;
}

message CloseStdinResponse {
  StdinState stdin_state = 1;
  uint64 final_offset = 2;
  WriteDisposition disposition = 3;
  GuestControlError error = 4;
}

message TtyWinResizeRequest {
  ExecRequestMetadata metadata = 1;
  uint64 control_seq = 2;
  uint32 rows = 3;
  uint32 cols = 4;
}

message ExecSignalRequest {
  ExecRequestMetadata metadata = 1;
  uint64 control_seq = 2;
  uint32 signal = 3;
  SignalTarget target = 4;
}

message ExecCancelRequest {
  ExecRequestMetadata metadata = 1;
  uint64 control_seq = 2;
  ExecCancelReason reason = 3;
}

message ControlAck {
  uint64 control_seq = 1;
  bool duplicate = 2;
  GuestControlError error = 3;
}

// W15 framework read of a host-declared guest file. The request is keyed by a
// closed enum (NOT a free-form path); guestd maps the key to the host-declared
// target path. The response is a single bounded payload; oversize files fail
// with FileTooLarge BEFORE any read/allocation. The guest-reported size/sha256
// are diagnostics only — the host recomputes both from the received bytes.
message ReadGuestFileRequest {
  RequestMetadata metadata = 1;
  GuestFileId file_id = 2;
}

message ReadGuestFileResponse {
  GuestFileId file_id = 1;
  uint64 size_bytes = 2;
  bytes content = 3;
  string sha256 = 4;
  GuestControlError error = 5;
}

message UsbipImportRequest {
  RequestMetadata metadata = 1;
  UsbipImportAction action = 2;
  string host = 3;
  string bus_id = 4;
}

message UsbipImportResponse {
  UsbipImportAction action = 1;
  string bus_id = 2;
  uint32 detached_ports = 3;
  GuestControlError error = 4;
}

message UsbipStatusRequest {
  RequestMetadata metadata = 1;
  optional string host = 2;
  optional string bus_id = 3;
}

message UsbipStatusResponse {
  repeated UsbipStatusEntry imports = 1;
  GuestControlError error = 2;
}

message UsbipStatusEntry {
  uint32 port = 1;
  string host = 2;
  uint32 tcp_port = 3;
  string bus_id = 4;
}

message GuestActivationStartRequest {
  RequestMetadata metadata = 1;
  string activation_id = 2;
  string switch_script_path = 3;
  GuestActivationMode mode = 4;
  uint64 timeout_ms = 5;
}

message GuestActivationStartResponse {
  string activation_id = 1;
  GuestActivationState state = 2;
  GuestControlError error = 3;
}

message GuestActivationStatusRequest {
  RequestMetadata metadata = 1;
  string activation_id = 2;
}

message GuestActivationStatusResponse {
  string activation_id = 1;
  GuestActivationState state = 2;
  optional int32 exit_code = 3;
  optional uint32 signal = 4;
  optional int32 status_code = 5;
  GuestControlError error = 6;
}

message ShellAttachRequest {
  RequestMetadata metadata = 1;
  optional string name = 2;
  bool force = 3;
  TerminalSize initial_terminal_size = 4;
}

message ShellAttachResponse {
  optional string session_id = 1;
  string resolved_name = 2;
  ShellState state = 3;
  bool force_evicted = 4;
  uint64 control_seq = 5;
  uint64 output_cursor = 6;
  GuestEffectiveLimits effective_limits = 7;
  GuestControlError error = 8;
}

message ShellListRequest {
  RequestMetadata metadata = 1;
}

message ShellListResponse {
  string default_name = 1;
  repeated ShellListEntry sessions = 2;
  GuestControlError error = 3;
}

message ShellListEntry {
  string name = 1;
  ShellState state = 2;
  bool attached = 3;
  bool is_default = 4;
}

message ShellDetachRequest {
  RequestMetadata metadata = 1;
  optional string name = 2;
}

message ShellKillRequest {
  RequestMetadata metadata = 1;
  string name = 2;
}

message ShellCloseAttachRequest {
  TerminalRequestMetadata metadata = 1;
}

message ShellDetachResponse {
  string resolved_name = 1;
  bool detached = 2;
  ShellCloseCause cause = 3;
  GuestControlError error = 4;
}

message ShellKillResponse {
  string name = 1;
  bool killed = 2;
  ShellState state = 3;
  GuestControlError error = 4;
}

message TerminalWriteStdinRequest {
  TerminalRequestMetadata metadata = 1;
  uint64 offset = 2;
  bytes data = 3;
  bool close_after = 4;
  optional uint64 client_deadline_ms = 5;
}

message TerminalReadOutputRequest {
  TerminalRequestMetadata metadata = 1;
  OutputStream stream = 2;
  uint64 offset = 3;
  uint64 max_len = 4;
  bool wait = 5;
  uint64 timeout_ms = 6;
}

message TerminalCloseStdinRequest {
  TerminalRequestMetadata metadata = 1;
  uint64 offset = 2;
}

message TerminalTtyWinResizeRequest {
  TerminalRequestMetadata metadata = 1;
  uint64 control_seq = 2;
  uint32 rows = 3;
  uint32 cols = 4;
}

message TerminalStatus {
  oneof outcome {
    int32 exit_code = 1;
    uint32 signal = 2;
    int32 status_code = 3;
    GuestControlErrorKind error = 4;
  }
}

message GuestControlError {
  GuestControlErrorKind kind = 1;
  HealthRemediation remediation = 2;
  optional uint64 retry_after_ms = 3;
}

enum GuestCapability {
  GUEST_CAPABILITY_UNSPECIFIED = 0;
  GUEST_CAPABILITY_HEALTH = 1;
  GUEST_CAPABILITY_CAPABILITIES = 2;
  GUEST_CAPABILITY_EXEC_ATTACHED = 3;
  GUEST_CAPABILITY_EXEC_DETACHED = 4;
  GUEST_CAPABILITY_EXEC_TTY = 5;
  GUEST_CAPABILITY_EXEC_LOGS = 6;
  GUEST_CAPABILITY_TTY_RESIZE = 7;
  GUEST_CAPABILITY_SIGNALS = 8;
  GUEST_CAPABILITY_READ_GUEST_FILE = 9;
  GUEST_CAPABILITY_USBIP_IMPORT = 10;
  GUEST_CAPABILITY_SHELL_ATTACHED = 11;
  GUEST_CAPABILITY_SHELL_MANAGEMENT = 12;
  GUEST_CAPABILITY_SHELL_FORCE_ATTACH = 13;
  GUEST_CAPABILITY_USBIP_STATUS = 14;
  GUEST_CAPABILITY_SYSTEM_ACTIVATION = 15;
}

enum GuestSubsystem {
  GUEST_SUBSYSTEM_UNSPECIFIED = 0;
  GUEST_SUBSYSTEM_GUESTD = 1;
  GUEST_SUBSYSTEM_USERD = 2;
  GUEST_SUBSYSTEM_EXEC = 3;
  GUEST_SUBSYSTEM_LOG_STORAGE = 4;
  GUEST_SUBSYSTEM_TOKEN = 5;
  GUEST_SUBSYSTEM_VSOCK = 6;
  GUEST_SUBSYSTEM_USBIP = 7;
  GUEST_SUBSYSTEM_SHELL = 8;
  GUEST_SUBSYSTEM_SHPOOL = 9;
  GUEST_SUBSYSTEM_SYSTEM_ACTIVATION = 10;
}

enum TerminalKind {
  TERMINAL_KIND_UNSPECIFIED = 0;
  TERMINAL_KIND_EXEC = 1;
  TERMINAL_KIND_SHELL = 2;
}

enum GuestActivationMode {
  GUEST_ACTIVATION_MODE_UNSPECIFIED = 0;
  GUEST_ACTIVATION_MODE_SWITCH = 1;
  GUEST_ACTIVATION_MODE_BOOT = 2;
  GUEST_ACTIVATION_MODE_TEST = 3;
  GUEST_ACTIVATION_MODE_DRY_ACTIVATE = 4;
}

enum GuestActivationState {
  GUEST_ACTIVATION_STATE_UNSPECIFIED = 0;
  GUEST_ACTIVATION_STATE_RUNNING = 1;
  GUEST_ACTIVATION_STATE_SUCCEEDED = 2;
  GUEST_ACTIVATION_STATE_FAILED = 3;
  GUEST_ACTIVATION_STATE_TIMED_OUT = 4;
  GUEST_ACTIVATION_STATE_LOST = 5;
}

enum ShellState {
  SHELL_STATE_UNSPECIFIED = 0;
  SHELL_STATE_ATTACHED = 1;
  SHELL_STATE_DETACHED = 2;
  SHELL_STATE_KILLED = 3;
  SHELL_STATE_POOL_UNAVAILABLE = 4;
  SHELL_STATE_FEATURE_DISABLED = 5;
  SHELL_STATE_OUTPUT_GAP = 6;
}

enum ShellCloseCause {
