  SHELL_CLOSE_CAUSE_EVICTED_BY_FORCE = 2;
  SHELL_CLOSE_CAUSE_EVICTED_BY_ADMIN_DETACH = 3;
  SHELL_CLOSE_CAUSE_KILLED_BY_ADMIN = 4;
  SHELL_CLOSE_CAUSE_POOL_UNAVAILABLE = 5;
  SHELL_CLOSE_CAUSE_OUTPUT_GAP = 6;
}

