// W15 ships only GuestConfig (the in-guest editable config working copy).
enum GuestFileId {
  GUEST_FILE_ID_UNSPECIFIED = 0;
  GUEST_FILE_ID_GUEST_CONFIG = 1;
}

enum UsbipImportAction {
  USBIP_IMPORT_ACTION_UNSPECIFIED = 0;
  USBIP_IMPORT_ACTION_ATTACH = 1;
  USBIP_IMPORT_ACTION_DETACH = 2;
}

enum HealthOrigin {
  HEALTH_ORIGIN_UNSPECIFIED = 0;
  HEALTH_ORIGIN_GUEST_REPORTED = 1;
  HEALTH_ORIGIN_HOST_SYNTHESIZED = 2;
}

enum HealthState {
