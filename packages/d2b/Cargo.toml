[package]
name = "d2b"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
publish = false
license.workspace = true

[lints]
workspace = true

[dependencies]
clap = { version = "4", features = ["derive"] }
nix = { version = "0.29", default-features = false, features = ["socket", "user", "signal"] }
d2b-daemon-access = { workspace = true, default-features = false }
protobuf.workspace = true
d2b-core = { workspace = true }
d2b-contracts = { workspace = true, features = ["cli-output"] }
d2b-realm-core = { workspace = true }
d2b-realm-router = { workspace = true }
rustix = { workspace = true }
schemars.workspace = true
serde.workspace = true
serde_json.workspace = true
sha2 = { workspace = true }
tokio = { workspace = true, default-features = false, features = ["macros", "rt", "time"] }

[dev-dependencies]
tempfile = "3"
