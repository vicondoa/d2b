[package]
name = "d2b"
version = "0.0.0-bootstrap"
edition = "2024"
publish = false
license.workspace = true

[lints]
workspace = true

[dependencies]
clap = { version = "4", features = ["derive"] }
nix = { version = "0.29", default-features = false, features = ["socket", "user", "signal"] }
d2b-core = { path = "../d2b-core", version = "0.0.0-bootstrap" }
d2b-contracts = { path = "../d2b-contracts", version = "0.0.0-bootstrap" }
d2b-realm-core = { path = "../d2b-realm-core", version = "0.0.0-bootstrap" }
d2b-realm-router = { path = "../d2b-realm-router", version = "0.0.0-bootstrap" }
rustix = { workspace = true }
schemars.workspace = true
serde.workspace = true
serde_json.workspace = true
sha2 = { workspace = true }

[dev-dependencies]
tempfile = "3"
