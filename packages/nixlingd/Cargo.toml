[package]
name = "nixlingd"
version = "0.0.0-bootstrap"
edition = "2021"
publish = false
license.workspace = true

[lints]
workspace = true

[dependencies]
async-trait = "0.1"
clap = { version = "4.5", features = ["derive"] }
getrandom = "0.2"
libc = "0.2"
nix = { version = "0.29", features = ["fs", "socket", "uio", "user", "signal", "process"] }
parking_lot = "0.12"
rustix = { workspace = true }
nixling-core = { path = "../nixling-core", version = "0.0.0-bootstrap" }
nixling-host = { path = "../nixling-host", version = "0.0.0-bootstrap" }
nixling-ipc = { path = "../nixling-ipc", version = "0.0.0-bootstrap" }
protobuf = "3.7.2"
semver = "1"
serde.workspace = true
sha2 = "0.10"
tracing = "0.1"
# v1.1.1 live-deploy fu9: stderr tracing subscriber for nixlingd
# so RUST_LOG=debug actually surfaces in journalctl. Without this
# the daemon initializes no subscriber and every `tracing::error!`
# call (e.g. InternalIo detail) is silently dropped, making live
# debugging impossible.
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
serde_json.workspace = true
socket2 = "0.5"
subtle = "2.6"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "sync", "time", "net"] }
ttrpc = { version = "0.9.0", default-features = false, features = ["async", "sync"] }
uzers = "0.12"

[dev-dependencies]
nixling-core = { path = "../nixling-core", version = "0.0.0-bootstrap", features = ["test-support"] }
regex = "1"
tempfile = "3"
