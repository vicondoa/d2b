[package]
name = "d2b-host"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
publish = false
license.workspace = true

[lints]
workspace = true

# d2b-host is the W3 disjoint host-prepare API surface consumed by
# d2bd and d2b-priv-broker. Stub modules land in the integrator
# prep commit; W3 scope agents s1-s4 fill them in.
#
# Dependency rule (per W3 file-ownership map): d2b-host depends only
# on d2b-core + d2b-contracts + low-level OS crates declared in the
# workspace. It must NEVER depend on d2bd or d2b-priv-broker
# (both are downstream consumers).

[features]
default = []
# Opt-in test backends used by scope agents to drive fake/recorded I/O
# without touching the real netlink / cgroup / nft surfaces. Real
# implementations live behind the default build.
fake-backends = []

[dependencies]
d2b-realm-core = { workspace = true }
d2b-realm-provider = { workspace = true }
d2b-core = { workspace = true }
d2b-contracts = { workspace = true, features = ["broker"] }
async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true
schemars.workspace = true
rustix = { workspace = true }
# `nix` provides safe Uid/Gid constructors and a safe `fchown` wrapper
# that `rustix 0.38` only exposes through `unsafe`. d2b-host is
# `#![forbid(unsafe_code)]`, so the cgroup delegation chown path uses
# `nix::unistd::fchown` rather than `rustix::fs::fchown`. `nix` is
# already a transitive workspace dependency (broker + d2bd), so
# this is not a new top-level supply-chain entry.
nix = { version = "0.29", default-features = false, features = ["fs", "user"] }
libc = "0.2"
sha2 = { workspace = true }
# `miniz_oxide` is a raw-DEFLATE decoder; d2b-host wraps it in a
# tiny inline gzip header/trailer skipper so the W3 kernel-module
# probe can read `/proc/config.gz` as a secondary kernel-config
# evidence source per plan.md §"W3 kernel-module probe order" step 4.
# Already in the workspace lockfile as a transitive of `backtrace`, so
# promoting it to a direct dependency does not widen the supply-chain
# surface tracked by cargo-deny + cargo-audit.
miniz_oxide = { version = "0.8", default-features = false, features = ["with-alloc"] }

[dev-dependencies]
nix = { version = "0.29", default-features = false, features = ["fs", "user"] }
d2b-core = { workspace = true, features = ["test-support"] }
serde_json.workspace = true
tempfile = "3"
tokio = { workspace = true, features = ["net"] }
ttrpc = { workspace = true, default-features = false, features = ["async"] }
