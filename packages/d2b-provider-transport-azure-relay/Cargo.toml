[package]
name = "d2b-provider-transport-azure-relay"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[features]
default = []

[dependencies]
async-trait.workspace = true
base64 = "0.22"
d2b-contracts = { workspace = true, default-features = false, features = ["v2-provider"] }
d2b-provider = { workspace = true, default-features = false }
d2b-provider-toolkit = { workspace = true, default-features = false }
futures-util = "0.3"
hmac = "0.12"
rustls = { version = "0.23", features = ["ring"] }
rustls-pki-types = "1"
serde_json.workspace = true
sha2.workspace = true
tokio = { workspace = true, features = ["io-util", "net", "rt", "sync", "time"] }
tokio-tungstenite = { version = "0.24", features = ["rustls-tls-webpki-roots"] }
urlencoding = "2"
webpki-roots = "0.26"
zeroize = "1"

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt", "sync", "time"] }

[lints]
workspace = true
