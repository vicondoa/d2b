[package]
name = "d2b-state"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[features]
default = []
host-fs = [
    "dep:d2b-contracts",
    "dep:nix",
    "dep:rustix",
    "dep:serde",
    "dep:serde_json",
    "dep:sha2",
]
tokio = ["host-fs", "dep:tokio"]

[dependencies]
d2b-contracts = { workspace = true, default-features = false, features = ["v2-state"], optional = true }
nix = { workspace = true, features = ["fs"], optional = true }
rustix = { workspace = true, optional = true }
serde = { workspace = true, optional = true }
serde_json = { workspace = true, features = ["raw_value"], optional = true }
sha2 = { workspace = true, optional = true }
tokio = { workspace = true, features = ["rt"], optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt", "rt-multi-thread", "sync", "time"] }

[lints]
workspace = true

[[test]]
name = "state"
required-features = ["host-fs"]

[[test]]
name = "async_state"
required-features = ["tokio"]
