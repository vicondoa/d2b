[package]
name = "d2b-gateway-runtime"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
publish = false
license.workspace = true

[lib]
doctest = false

[[bin]]
name = "d2b-provider-agent"
path = "src/bin/d2b-provider-agent.rs"

[lints]
workspace = true

# Top-level gateway composition (ADR 0032): ties the codec-neutral
# d2b-gateway orchestrator/handshake to the concrete Azure Relay transport
# (d2b-provider-relay) and the ACA workload provider (d2b-provider-aca).
# This is the only crate that depends on both the gateway and the providers; it
# is where the per-session handshake becomes the relay prologue that gates the
# display byte stream. Nothing else depends on it (it is the composition root
# consumed by the gateway-mode daemon).
[dependencies]
async-trait.workspace = true
d2b-contracts = { workspace = true, default-features = false, features = ["v2-services"] }
d2b-gateway = { workspace = true }
d2b-provider-relay = { workspace = true }
d2b-provider-aca = { workspace = true }
d2b-provider = { workspace = true }
d2b-provider-toolkit = { workspace = true }
d2b-realm-core = { workspace = true }
d2b-realm-provider = { workspace = true }
d2b-session = { workspace = true, default-features = false }
protobuf.workspace = true
tokio = { workspace = true, default-features = false, features = ["macros", "rt", "rt-multi-thread", "sync", "time"] }
ttrpc = { workspace = true, features = ["async"] }
base64 = "0.22"
chacha20poly1305 = "0.10"
getrandom = "0.2"
libc = "0.2"
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
tracing = "0.1"
tracing-subscriber = "0.3"

[dev-dependencies]
azure_core = "1.0.0"
tempfile = "3"
