[package]
name = "d2b-gateway-runtime"
version = "0.0.0-bootstrap"
edition = "2024"
publish = false
license.workspace = true

[lib]
doctest = false

[lints]
workspace = true

# Top-level gateway composition (ADR 0032): ties the codec-neutral
# d2b-gateway orchestrator/handshake to the concrete Azure Relay transport
# (d2b-provider-relay) and the ACA workload provider (d2b-provider-aca).
# This is the only crate that depends on both the gateway and the providers; it
# is where the per-session handshake becomes the relay prologue that gates the
# display byte stream. Nothing else depends on it (it is the composition root
# consumed by the gateway-mode daemon).
[dependencies]
d2b-gateway = { path = "../d2b-gateway", version = "0.0.0-bootstrap" }
d2b-provider-relay = { path = "../d2b-provider-relay", version = "0.0.0-bootstrap" }
d2b-provider-aca = { path = "../d2b-provider-aca", version = "0.0.0-bootstrap" }
d2b-constellation-core = { path = "../d2b-constellation-core", version = "0.0.0-bootstrap" }
d2b-constellation-provider = { path = "../d2b-constellation-provider", version = "0.0.0-bootstrap" }
async-trait = "0.1"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "sync", "time"] }
base64 = "0.22"
chacha20poly1305 = "0.10"
getrandom = "0.2"
libc = "0.2"
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
tracing = "0.1"
tracing-subscriber = "0.3"

[dev-dependencies]
azure_core = "1.0.0"
tempfile = "3"
