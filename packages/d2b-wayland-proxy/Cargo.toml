[package]
name = "d2b-wayland-proxy"
version = "0.1.0"
edition = "2024"
license.workspace = true
description = "Provider-neutral host-side Wayland proxy for d2b workloads"

[dependencies]
clap = { version = "4", features = ["derive"] }
d2b-core = { path = "../d2b-core" }
d2b-realm-core = { path = "../d2b-realm-core" }
libc = "0.2"
log = "0.4"
env_logger = "0.11"
getrandom = "0.2"
nix = { version = "0.29", default-features = false, features = ["fs", "socket", "uio"] }
rustix = { workspace = true, features = ["event"] }
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
smallvec = "1"
thiserror = "2"
uapi = "0.2"
wl-proxy = { version = "=0.1.2", git = "https://github.com/vicondoa/wl-proxy.git", rev = "072945b59fef21a2a8166460454280d543f48772", package = "wl-proxy", features = [
    "protocol-drm",
    "protocol-stream",
    "protocol-wl_eglstream_controller",
    "suite-wayland-protocols",
    "suite-wlr-protocols",
] }

[lints]
workspace = true
