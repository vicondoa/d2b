[package]
name = "d2b-realm-transport"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
publish = false
license.workspace = true

[lib]
doctest = false

[lints]
workspace = true

# Transport trait home + an in-memory loopback `TransportProvider` for
# conformance (ADR 0032). Depends only on the contract crates +
# async-trait + tokio io/sync; MUST NOT depend on a protocol codec, a real
# transport, or any host-only broker/daemon internals (dependency-direction
# gate). The loopback opens NO real socket.
[dependencies]
d2b-realm-core = { workspace = true }
d2b-realm-provider = { workspace = true }
async-trait.workspace = true
tokio = { workspace = true, default-features = false, features = ["io-util", "net", "rt", "sync", "time"] }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt", "io-util", "net", "sync", "time"] }
