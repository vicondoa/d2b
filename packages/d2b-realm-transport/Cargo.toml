[package]
name = "d2b-realm-transport"
version = "0.0.0-bootstrap"
edition = "2024"
publish = false
license.workspace = true

[lib]
doctest = false

[lints]
workspace = true

# Transport trait home + an in-memory loopback `TransportProvider` for
# conformance (ADR 0032). Depends only on the contract crates +
# async-trait + tokio io/sync; MUST NOT depend on a protocol codec, a real
# transport, or any host-only broker/daemon internals (dependency-direction
# gate). The loopback opens NO real socket.
[dependencies]
d2b-realm-core = { path = "../d2b-realm-core", version = "0.0.0-bootstrap" }
d2b-realm-provider = { path = "../d2b-realm-provider", version = "0.0.0-bootstrap" }
async-trait = "0.1"
tokio = { version = "1", default-features = false, features = ["io-util", "net", "rt", "sync", "time"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "io-util", "net", "sync", "time"] }
