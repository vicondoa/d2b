[package]
name = "d2b-guest-shell-runner"
version = "0.0.0-bootstrap"
edition = "2024"
publish = false
license = "Apache-2.0"

[workspace]

[lints.rust]
unsafe_code = "deny"
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(test_root)"] }

[features]
default = []
real-libshpool = ["dep:libshpool"]

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
libshpool = { version = "0.11.0", optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
