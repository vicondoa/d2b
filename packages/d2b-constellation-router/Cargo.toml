[package]
name = "d2b-constellation-router"
version = "0.0.0-bootstrap"
edition = "2024"
publish = false
license.workspace = true

[lib]
doctest = false

[lints]
workspace = true

# Codec-neutral operation router (ADR 0032). Routes typed semantic commands
# derived from a decoded ConstellationFrame; owns idempotency-key + dedup
# enforcement and per-operation capability derivation. Depends ONLY on the
# codec-neutral contract crates (core + provider); MUST NOT depend on
# prost/codec, a transport impl, or host-only internals (dep-direction gate).
[dependencies]
d2b-constellation-core = { path = "../d2b-constellation-core", version = "0.0.0-bootstrap" }
d2b-constellation-provider = { path = "../d2b-constellation-provider", version = "0.0.0-bootstrap" }
# The peer-session boundary reads/writes length-delimited frames over a
# transport ByteStream (AsyncRead + AsyncWrite). Only the io traits are
# needed here; no runtime/network features (the dep-direction gate still
# forbids a codec/transport-impl dependency).
tokio = { version = "1", default-features = false, features = ["io-util"] }
chacha20poly1305 = "0.10"
hmac = "0.12"
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = "0.10"
subtle = "2"
tracing = "0.1"

[dev-dependencies]
d2b-constellation-transport = { path = "../d2b-constellation-transport", version = "0.0.0-bootstrap" }
d2b-constellation-codec-protobuf = { path = "../d2b-constellation-codec-protobuf", version = "0.0.0-bootstrap" }
tokio = { version = "1", default-features = false, features = ["io-util", "macros", "rt", "sync"] }
