[package]
name = "nixling-provider-relay"
version = "0.0.0-bootstrap"
edition = "2024"
publish = false
license.workspace = true

[lib]
doctest = false

[lints]
workspace = true

# Azure Relay transport (ADR 0032, P0): the credential model + connect
# contract + the WebSocket transport for the realm gateway. The gateway holds
# the Listen credential; per the three-plane model the container authenticates
# to Relay with an Entra bearer token from its managed identity (plane 2), so
# no SAS key enters the sandbox. All secret material has a redacted Debug.
[dependencies]
hmac = "0.12"
sha2 = "0.10"
base64 = "0.22"
urlencoding = "2"
tokio = { version = "1", features = ["rt", "net", "io-util", "macros", "time"] }
tokio-tungstenite = { version = "0.24", features = ["rustls-tls-webpki-roots"] }
rustls = { version = "0.23", features = ["ring"] }
futures-util = "0.3"
serde_json = { workspace = true }
rustls-pemfile = "2"
webpki-roots = "0.26"

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
