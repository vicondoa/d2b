[package]
name = "nixling-wayland-filter"
version = "0.1.0"
edition = "2021"
license.workspace = true
description = "Host-side Wayland filter proxy for nixling graphics VMs"

[dependencies]
clap = { version = "4", features = ["derive"] }
log = "0.4"
env_logger = "0.11"
thiserror = "2"
wl-proxy = { version = "=0.1.2", features = [
    "suite-wayland-protocols",
    "suite-wlr-protocols",
] }

[lints]
workspace = true
