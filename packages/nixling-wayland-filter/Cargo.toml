[package]
name = "nixling-wayland-filter"
version = "0.1.0"
edition = "2024"
license.workspace = true
description = "Host-side Wayland filter proxy for nixling graphics VMs"

[dependencies]
clap = { version = "4", features = ["derive"] }
libc = "0.2"
log = "0.4"
env_logger = "0.11"
nix = { version = "0.29", default-features = false, features = ["fs", "uio"] }
thiserror = "2"
uapi = "0.2"
wl-proxy = { version = "=0.1.2", git = "https://github.com/vicondoa/wl-proxy.git", rev = "072945b59fef21a2a8166460454280d543f48772", package = "wl-proxy", features = [
    "protocol-drm",
    "protocol-stream",
    "protocol-wl_eglstream_controller",
    "suite-wayland-protocols",
    "suite-wlr-protocols",
] }

[lints]
workspace = true
