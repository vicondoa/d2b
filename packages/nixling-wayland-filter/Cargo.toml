[package]
name = "nixling-wayland-filter"
version = "0.1.0"
edition = "2021"
license.workspace = true
description = "Host-side Wayland filter proxy for nixling graphics VMs"

[dependencies]
clap = { version = "4", features = ["derive"] }
libc = "0.2"
log = "0.4"
env_logger = "0.11"
thiserror = "2"
wl-proxy = { git = "https://github.com/vicondoa/wl-proxy.git", rev = "2f4f54a930fcb8a2a75f851ccc0f86798d4cc21c", package = "wl-proxy", features = [
    "suite-wayland-protocols",
    "suite-wlr-protocols",
] }

[lints]
workspace = true
