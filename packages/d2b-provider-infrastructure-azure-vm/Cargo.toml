[package]
name = "d2b-provider-infrastructure-azure-vm"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[features]
default = []
conformance = ["dep:d2b-azure-vm-fake-sdk", "dep:d2b-provider-toolkit"]

[dependencies]
d2b-azure-vm-fake-sdk = { workspace = true, optional = true }
d2b-contracts = { workspace = true, default-features = false, features = ["v2-provider"] }
d2b-provider = { workspace = true, default-features = false }
d2b-provider-toolkit = { workspace = true, default-features = false, optional = true }

[dev-dependencies]
d2b-azure-vm-fake-sdk.workspace = true
d2b-provider-toolkit = { workspace = true, default-features = false }
tokio = { workspace = true, features = ["macros", "rt", "sync", "time"] }

[lints]
workspace = true
