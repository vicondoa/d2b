[package]
name = "d2b-host-providers"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
publish = false
license.workspace = true

[lib]
doctest = false

[lints]
workspace = true

# Host-side provider adapters (ADR 0032): LocalMicroVmProvider
# (RuntimeProvider) and LocalCrossDomainWaylandProvider (DisplayProvider),
# behavior-preserving wrappers over the existing d2b-host argv/plan
# generators. This crate legitimately depends on d2b-host (it is the
# host adapter); the dependency-direction gate does NOT treat it as a pure
# contract crate, so the provider TRAIT crates never gain a host edge.
[dependencies]
d2b-realm-core = { workspace = true }
d2b-realm-provider = { workspace = true }
d2b-core = { workspace = true }
d2b-host = { workspace = true }
async-trait.workspace = true
tokio = { workspace = true, features = ["rt"] }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt"] }
serde_json.workspace = true
