[package]
name = "nixling-constellation-transport"
version = "0.0.0-bootstrap"
edition = "2024"
publish = false
license.workspace = true

[lib]
doctest = false

[lints]
workspace = true

# Transport trait home + an in-memory loopback `TransportProvider` for
# conformance (ADR 0032). Depends only on the contract crates +
# async-trait + tokio io/sync; MUST NOT depend on a protocol codec, a real
# transport, or any host-only broker/daemon internals (dependency-direction
# gate). The loopback opens NO real socket.
[dependencies]
nixling-constellation-core = { path = "../nixling-constellation-core", version = "0.0.0-bootstrap" }
nixling-constellation-provider = { path = "../nixling-constellation-provider", version = "0.0.0-bootstrap" }
async-trait = "0.1"
tokio = { version = "1", default-features = false, features = ["io-util", "rt", "sync"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "io-util", "sync"] }
