[package]
name = "nixling-constellation-core"
version = "0.0.0-bootstrap"
edition = "2021"
publish = false
license.workspace = true

[lib]
doctest = false

[lints]
workspace = true

# Pure, codec-neutral constellation model (ADR 0032). This crate is the
# shared contract every later v2 crate depends on. It MUST NOT depend on
# `prost`, generated protobuf, any codec crate, any transport crate, or
# any host-only broker/daemon internals. The dependency-direction gate
# (tests/unit/meta/) enforces this.
[dependencies]
serde.workspace = true
schemars.workspace = true

[dev-dependencies]
serde_json.workspace = true
