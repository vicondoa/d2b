d2b-provider-device-host-mediated = { path = "d2b-provider-device-host-mediated", version = "2.0.0", default-features = false }
d2b-provider-display-wayland = { path = "d2b-provider-display-wayland", version = "2.0.0", default-features = false }
d2b-provider-host = { path = "d2b-provider-host", version = "2.0.0" }
d2b-provider-infrastructure-azure-vm = { path = "d2b-provider-infrastructure-azure-vm", version = "2.0.0", default-features = false }
d2b-provider-network-local-realm = { path = "d2b-provider-network-local-realm", version = "2.0.0", default-features = false }
d2b-provider-observability-local = { path = "d2b-provider-observability-local", version = "2.0.0", default-features = false }
d2b-provider-relay = { path = "d2b-provider-relay", version = "2.0.0" }
d2b-provider-runtime-azure-container-apps = { path = "d2b-provider-runtime-azure-container-apps", version = "2.0.0", default-features = false }
d2b-provider-runtime-azure-vm = { path = "d2b-provider-runtime-azure-vm", version = "2.0.0", default-features = false }
d2b-provider-runtime-local = { path = "d2b-provider-runtime-local", version = "2.0.0", default-features = false }
d2b-provider-storage-local = { path = "d2b-provider-storage-local", version = "2.0.0", default-features = false }
d2b-provider-substrate-host = { path = "d2b-provider-substrate-host", version = "2.0.0", default-features = false }
