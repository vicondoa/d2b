[workspace]
resolver = "2"
members = [
    "d2b",
    "d2b-azure-vm-fake-sdk",
    "d2b-client",
    "d2b-clipd",
    "d2b-contract-tests",
    "d2b-contracts",
    "d2b-core",
    "d2b-core/fuzz",
    "d2b-daemon-access",
    "d2b-exec-runner",
    "d2b-gateway",
    "d2b-gateway-runtime",
    "d2b-guest-shell-runner",
    "d2b-guestd",
    "d2b-host",
    "d2b-host-activation-helper",
    "d2b-notify",
    "d2b-priv-broker",
    "d2b-provider",
    "d2b-provider-aca",
    "d2b-provider-audio-pipewire-vhost-user",
    "d2b-provider-credential-entra",
    "d2b-provider-credential-managed-identity",
    "d2b-provider-credential-secret-service",
    "d2b-provider-device-host-mediated",
    "d2b-provider-display-wayland",
    "d2b-provider-host",
    "d2b-provider-infrastructure-azure-vm",
    "d2b-provider-network-local-realm",
    "d2b-provider-observability-local",
    "d2b-provider-relay",
    "d2b-provider-runtime-azure-container-apps",
    "d2b-provider-runtime-azure-vm",
    "d2b-provider-runtime-local",
    "d2b-provider-storage-local",
    "d2b-provider-substrate-host",
    "d2b-provider-toolkit",
    "d2b-provider-transport-azure-relay",
    "d2b-provider-transport-local",
    "d2b-realm-codec-protobuf",
    "d2b-realm-core",
    "d2b-realm-provider",
    "d2b-realm-router",
    "d2b-realm-transport",
    "d2b-runtime-systemd-user",
    "d2b-session",
    "d2b-session-unix",
    "d2b-shell-supervisor",
    "d2b-sk-frontend",
    "d2b-state",
    "d2b-systemd-user-agent",
    "d2b-ttrpc-api-fit-spike",
    "d2b-unsafe-local-helper",
    "d2b-userd",
    "d2b-wayland-proxy",
    "d2bd",
    "xtask",
]

[workspace.package]
version = "2.0.0"
edition = "2024"
rust-version = "1.94.1"
license = "Apache-2.0"
repository = "https://github.com/vicondoa/d2b"

[workspace.lints.clippy]
all = "warn"

[workspace.lints.rust]
unsafe_code = "forbid"
# `test_root` is an opt-in cfg flag used by a small set of
# d2bd integration tests that require running as uid 0 (or
# with delegated CAP_CHOWN) to exercise broker-owner production
# policy. Set via `RUSTFLAGS="--cfg test_root" cargo test
# --features=...` when executing as root. Declaring the
# check-cfg entry here silences the `unexpected_cfgs` warning
# the v1.1.1 panel reviewer flagged without weakening the
# safety guard for production callers.
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(test_root)"] }

[workspace.dependencies]
d2b = { path = "d2b", version = "2.0.0" }
d2b-azure-vm-fake-sdk = { path = "d2b-azure-vm-fake-sdk", version = "2.0.0", default-features = false }
d2b-client = { path = "d2b-client", version = "2.0.0", default-features = false }
d2b-clipd = { path = "d2b-clipd", version = "2.0.0" }
d2b-contracts = { path = "d2b-contracts", version = "2.0.0", default-features = false }
d2b-core = { path = "d2b-core", version = "2.0.0" }
d2b-daemon-access = { path = "d2b-daemon-access", version = "2.0.0", default-features = false }
d2b-exec-runner = { path = "d2b-exec-runner", version = "2.0.0" }
d2b-gateway = { path = "d2b-gateway", version = "2.0.0" }
d2b-gateway-runtime = { path = "d2b-gateway-runtime", version = "2.0.0" }
d2b-guestd = { path = "d2b-guestd", version = "2.0.0" }
d2b-host = { path = "d2b-host", version = "2.0.0" }
d2b-provider = { path = "d2b-provider", version = "2.0.0", default-features = false }
d2b-provider-aca = { path = "d2b-provider-aca", version = "2.0.0" }
d2b-provider-audio-pipewire-vhost-user = { path = "d2b-provider-audio-pipewire-vhost-user", version = "2.0.0", default-features = false }
