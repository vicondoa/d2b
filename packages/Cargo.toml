[workspace]
resolver = "2"
members = [
    "d2b-host-activation-helper",
    "d2b-core",
    "d2b-core/fuzz",
    "d2b-realm-core",
    "d2b-realm-provider",
    "d2b-realm-transport",
    "d2b-realm-codec-protobuf",
    "d2b-realm-router",
    "d2b-daemon-access",
    "d2b-host-providers",
    "d2b-provider-aca",
    "d2b-provider-relay",
    "d2b-gateway",
    "d2b-gateway-runtime",
    "d2b-host",
    "d2b-guestd",
    "d2b-userd",
    "d2b-unsafe-local-helper",
    "d2b-exec-runner",
    "d2b-sk-frontend",
    "d2b-contracts",
    "d2b",
    "d2bd",
    "d2b-clipd",
    "d2b-notify",
    "d2b-wayland-proxy",
    "d2b-contract-tests",
    "d2b-ttrpc-api-fit-spike",
    "d2b-priv-broker",
    "d2b-guest-shell-runner",
    "xtask",
]

[workspace.package]
version = "2.0.0"
edition = "2024"
rust-version = "1.94.1"
license = "Apache-2.0"
repository = "https://github.com/vicondoa/d2b"

[workspace.lints.clippy]
all = "warn"

[workspace.lints.rust]
unsafe_code = "forbid"
# `test_root` is an opt-in cfg flag used by a small set of
# d2bd integration tests that require running as uid 0 (or
# with delegated CAP_CHOWN) to exercise broker-owner production
# policy. Set via `RUSTFLAGS="--cfg test_root" cargo test
# --features=...` when executing as root. Declaring the
# check-cfg entry here silences the `unexpected_cfgs` warning
# the v1.1.1 panel reviewer flagged without weakening the
# safety guard for production callers.
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(test_root)"] }

[workspace.dependencies]
d2b = { path = "d2b", version = "2.0.0" }
d2b-clipd = { path = "d2b-clipd", version = "2.0.0" }
d2b-contracts = { path = "d2b-contracts", version = "2.0.0" }
d2b-core = { path = "d2b-core", version = "2.0.0" }
d2b-daemon-access = { path = "d2b-daemon-access", version = "2.0.0" }
d2b-exec-runner = { path = "d2b-exec-runner", version = "2.0.0" }
d2b-gateway = { path = "d2b-gateway", version = "2.0.0" }
d2b-gateway-runtime = { path = "d2b-gateway-runtime", version = "2.0.0" }
d2b-guestd = { path = "d2b-guestd", version = "2.0.0" }
d2b-host = { path = "d2b-host", version = "2.0.0" }
d2b-host-providers = { path = "d2b-host-providers", version = "2.0.0" }
d2b-provider-aca = { path = "d2b-provider-aca", version = "2.0.0" }
d2b-provider-relay = { path = "d2b-provider-relay", version = "2.0.0" }
d2b-realm-codec-protobuf = { path = "d2b-realm-codec-protobuf", version = "2.0.0" }
d2b-realm-core = { path = "d2b-realm-core", version = "2.0.0" }
d2b-realm-provider = { path = "d2b-realm-provider", version = "2.0.0" }
d2b-realm-router = { path = "d2b-realm-router", version = "2.0.0" }
d2b-realm-transport = { path = "d2b-realm-transport", version = "2.0.0" }
d2b-wayland-proxy = { path = "d2b-wayland-proxy", version = "2.0.0" }
async-trait = "0.1"
protobuf = "=3.7.2"
protobuf-codegen = "=3.7.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = { version = "0.8", features = ["derive"] }
rustix = { version = "0.38", features = ["fs", "process", "net", "pipe", "system", "mount", "thread", "pty", "termios", "stdio"] }
rtnetlink = "0.14"
sha2 = "0.10"
tokio = { version = "1", default-features = false }
ttrpc = { version = "=0.9.0", default-features = false }
ttrpc-codegen = "=0.6.0"
