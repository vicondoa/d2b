[advisories]
ignore = [
    # Build-time wayland-scanner pulls quick-xml 0.39.4; runtime users were
    # updated away from vulnerable 0.37.x. Remove once wayland-scanner publishes
    # a release on quick-xml >= 0.41.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[licenses]
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/vicondoa/wl-proxy.git"]
