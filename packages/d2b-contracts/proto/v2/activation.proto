syntax = "proto3";
package d2b.activation.v2;
import "common.proto";
service ActivationService {
  rpc Activate(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc Inspect(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc Cancel(d2b.common.v2.CancelRequest) returns (d2b.common.v2.CancelResponse);
}
