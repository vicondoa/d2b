syntax = "proto3";
// Protobuf identifiers cannot contain '-'. The generated ttrpc dispatch path
// is rewritten to the ComponentSession package d2b.security-key.v2.
package d2b.security_key.v2;
import "common.proto";
service SecurityKeyService {
  rpc BeginCeremony(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc ExchangeReport(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc Approve(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc CancelCeremony(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc Inspect(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc Cancel(d2b.common.v2.CancelRequest) returns (d2b.common.v2.CancelResponse);
}
