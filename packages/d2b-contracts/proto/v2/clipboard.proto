syntax = "proto3";
package d2b.clipboard.v2;
import "common.proto";
service ClipboardService {
  rpc Offer(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc InspectOffer(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc AcceptTransfer(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc CompleteTransfer(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc CancelTransfer(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc BridgeReady(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc Cancel(d2b.common.v2.CancelRequest) returns (d2b.common.v2.CancelResponse);
}
