syntax = "proto3";
package d2b.wayland.v2;
import "common.proto";
service WaylandService {
  rpc OpenDisplay(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc InspectDisplay(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc CloseDisplay(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc BridgeReady(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc Cancel(d2b.common.v2.CancelRequest) returns (d2b.common.v2.CancelResponse);
}
