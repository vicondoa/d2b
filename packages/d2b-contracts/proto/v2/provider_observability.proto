syntax = "proto3";
package d2b.provider.v2;
import "common.proto";
service ObservabilityProviderService {
  rpc Health(d2b.common.v2.ProviderRequest) returns (d2b.common.v2.ProviderResponse);
  rpc Capabilities(d2b.common.v2.CapabilityRequest) returns (d2b.common.v2.CapabilityResponse);
  rpc Status(d2b.common.v2.ProviderRequest) returns (d2b.common.v2.ProviderResponse);
  rpc Query(d2b.common.v2.ProviderRequest) returns (d2b.common.v2.ProviderResponse);
  rpc Subscribe(d2b.common.v2.ProviderRequest) returns (d2b.common.v2.ProviderResponse);
  rpc Export(d2b.common.v2.ProviderRequest) returns (d2b.common.v2.ProviderResponse);
}
