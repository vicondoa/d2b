syntax = "proto3";
package d2b.provider.v2;
import "common.proto";
service TransportProviderService {
  rpc Health(d2b.common.v2.ProviderRequest) returns (d2b.common.v2.ProviderResponse);
  rpc Capabilities(d2b.common.v2.CapabilityRequest) returns (d2b.common.v2.CapabilityResponse);
  rpc Connect(d2b.common.v2.ProviderRequest) returns (d2b.common.v2.ProviderResponse);
  rpc Listen(d2b.common.v2.ProviderRequest) returns (d2b.common.v2.ProviderResponse);
  rpc IssueBinding(d2b.common.v2.ProviderRequest) returns (d2b.common.v2.ProviderResponse);
  rpc RevokeBinding(d2b.common.v2.ProviderRequest) returns (d2b.common.v2.ProviderResponse);
  rpc Inspect(d2b.common.v2.ProviderRequest) returns (d2b.common.v2.ProviderResponse);
}
