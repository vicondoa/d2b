syntax = "proto3";
package d2b.provider.v2;
import "common.proto";
service InfrastructureProviderService {
  rpc Health(d2b.common.v2.ProviderRequest) returns (d2b.common.v2.ProviderResponse);
  rpc Capabilities(d2b.common.v2.CapabilityRequest) returns (d2b.common.v2.CapabilityResponse);
  rpc Plan(d2b.common.v2.ProviderRequest) returns (d2b.common.v2.ProviderResponse);
  rpc Apply(d2b.common.v2.ProviderRequest) returns (d2b.common.v2.ProviderResponse);
  rpc SetPowerState(d2b.common.v2.ProviderRequest) returns (d2b.common.v2.ProviderResponse);
  rpc Inspect(d2b.common.v2.ProviderRequest) returns (d2b.common.v2.ProviderResponse);
  rpc Adopt(d2b.common.v2.ProviderRequest) returns (d2b.common.v2.ProviderResponse);
  rpc BootstrapBinding(d2b.common.v2.ProviderRequest) returns (d2b.common.v2.ProviderResponse);
  rpc Destroy(d2b.common.v2.ProviderRequest) returns (d2b.common.v2.ProviderResponse);
}
