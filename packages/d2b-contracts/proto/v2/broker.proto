syntax = "proto3";
package d2b.broker.v2;
import "common.proto";
service BrokerService {
  rpc ValidateLease(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc Allocate(AllocateRequest) returns (AllocateResponse);
  rpc Delegate(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc Spawn(SpawnRealmChildrenRequest) returns (SpawnRealmChildrenResponse);
  rpc OpenResource(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc Apply(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc Observe(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc RevokeLease(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc ExportAudit(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc Cancel(d2b.common.v2.CancelRequest) returns (d2b.common.v2.CancelResponse);
}

enum HostResourceKind {
  HOST_RESOURCE_KIND_UNSPECIFIED = 0;
  HOST_RESOURCE_KIND_BRIDGE = 1;
  HOST_RESOURCE_KIND_TAP = 2;
  HOST_RESOURCE_KIND_VETH_PAIR = 3;
  HOST_RESOURCE_KIND_NFTABLES_TABLE = 4;
  HOST_RESOURCE_KIND_NFTABLES_PARTITION = 5;
  HOST_RESOURCE_KIND_CGROUP_SUBTREE = 6;
  HOST_RESOURCE_KIND_HOST_FILE_PARTITION = 7;
  HOST_RESOURCE_KIND_NAMESPACE_BOUNDARY = 8;
}

enum ResourceShareMode {
  RESOURCE_SHARE_MODE_UNSPECIFIED = 0;
  RESOURCE_SHARE_MODE_EXCLUSIVE = 1;
  RESOURCE_SHARE_MODE_SHARED_PARTITION = 2;
}

enum ResourceDelegationKind {
  RESOURCE_DELEGATION_KIND_UNSPECIFIED = 0;
  RESOURCE_DELEGATION_KIND_OPAQUE_NAME = 1;
  RESOURCE_DELEGATION_KIND_FILE_DESCRIPTOR = 2;
  RESOURCE_DELEGATION_KIND_PARTITION_ID = 3;
  RESOURCE_DELEGATION_KIND_NAMESPACE_HANDLE = 4;
}

enum AllocatorReason {
  ALLOCATOR_REASON_UNSPECIFIED = 0;
  ALLOCATOR_REASON_RESOURCE_CONFLICT = 1;
  ALLOCATOR_REASON_OWNERSHIP_CONFLICT = 2;
  ALLOCATOR_REASON_ACQUISITION_ORDER_VIOLATION = 3;
  ALLOCATOR_REASON_INVALID_REQUEST = 4;
  ALLOCATOR_REASON_CAPACITY_EXHAUSTED = 5;
  ALLOCATOR_REASON_DRIFT_DETECTED = 6;
  ALLOCATOR_REASON_RECONCILE_MISMATCH = 7;
  ALLOCATOR_REASON_OWNER_NOT_LIVE = 8;
  ALLOCATOR_REASON_POLICY_DENIED = 9;
  ALLOCATOR_REASON_UNSUPPORTED_KIND = 10;
  ALLOCATOR_REASON_STORAGE_CONTRACT_VIOLATION = 11;
  ALLOCATOR_REASON_KERNEL_STATE_UNKNOWN = 12;
}

enum AllocationStatus {
  ALLOCATION_STATUS_UNSPECIFIED = 0;
  ALLOCATION_STATUS_GRANTED = 1;
  ALLOCATION_STATUS_DENIED = 2;
}

message LeaseOwner {
  string realm_path = 1;
  string controller_generation_id = 2;
  optional string node_id = 3;
}

message ResourceAcquisitionOrder {
  uint32 phase = 1;
  uint32 ordinal = 2;
}

message LeaseResourceRequest {
  string resource_id = 1;
  HostResourceKind kind = 2;
  ResourceShareMode share = 3;
  ResourceAcquisitionOrder acquisition_order = 4;
}

message AllocateRequest {
  d2b.common.v2.RequestMetadata metadata = 1;
  d2b.common.v2.IdentityScope scope = 2;
  string operation_id = 3;
  LeaseOwner owner = 4;
  repeated LeaseResourceRequest resources = 5;
  bytes request_digest = 6;
}

message GrantedHostResource {
  string resource_id = 1;
  HostResourceKind kind = 2;
  ResourceShareMode share = 3;
  ResourceDelegationKind delegation = 4;
  string delegation_id = 5;
  ResourceAcquisitionOrder acquisition_order = 6;
  optional uint32 attachment_index = 7;
}

message AllocatorConflict {
  string resource_id = 1;
  HostResourceKind kind = 2;
  AllocatorReason reason = 3;
  optional string existing_lease_id = 4;
}

message AllocateResponse {
  d2b.common.v2.Outcome outcome = 1;
  string operation_id = 2;
  AllocationStatus status = 3;
  string lease_id = 4;
  repeated GrantedHostResource resources = 5;
  AllocatorReason reason = 6;
  repeated AllocatorConflict conflicts = 7;
  d2b.common.v2.ErrorEnvelope error = 8;
}

enum RealmChildRole {
  REALM_CHILD_ROLE_UNSPECIFIED = 0;
  REALM_CHILD_ROLE_CONTROLLER = 1;
  REALM_CHILD_ROLE_BROKER = 2;
}

enum RealmChildFdKind {
  REALM_CHILD_FD_KIND_UNSPECIFIED = 0;
  REALM_CHILD_FD_KIND_PUBLIC_LISTENER = 1;
  REALM_CHILD_FD_KIND_BROKER_LISTENER = 2;
  REALM_CHILD_FD_KIND_USER_NAMESPACE = 3;
  REALM_CHILD_FD_KIND_MOUNT_NAMESPACE = 4;
  REALM_CHILD_FD_KIND_NETWORK_NAMESPACE = 5;
  REALM_CHILD_FD_KIND_IPC_NAMESPACE = 6;
  REALM_CHILD_FD_KIND_PID_NAMESPACE = 7;
  REALM_CHILD_FD_KIND_CGROUP_NAMESPACE = 8;
  REALM_CHILD_FD_KIND_CGROUP_LEAF = 9;
  REALM_CHILD_FD_KIND_STATE_ROOT = 10;
  REALM_CHILD_FD_KIND_AUDIT_ROOT = 11;
  REALM_CHILD_FD_KIND_RESOURCE = 12;
  REALM_CHILD_FD_KIND_LEASE = 13;
  REALM_CHILD_FD_KIND_BOOTSTRAP_SESSION = 14;
}

message RealmChildFd {
  RealmChildRole role = 1;
  RealmChildFdKind kind = 2;
  uint32 attachment_index = 3;
  // Required only for RESOURCE and LEASE. Singleton authority kinds must omit it.
  optional string resource_id = 4;
}

message SpawnRealmChildrenRequest {
  d2b.common.v2.RequestMetadata metadata = 1;
  d2b.common.v2.IdentityScope scope = 2;
  string operation_id = 3;
  string realm_id = 4;
  string controller_generation_id = 5;
  string controller_process_id = 6;
  string broker_process_id = 7;
  bytes launch_record_digest = 8;
  repeated RealmChildFd fds = 9;
}

message SpawnedRealmChild {
  RealmChildRole role = 1;
  string process_id = 2;
  // Controller is attachment 0; broker is attachment 1.
  uint32 pidfd_attachment_index = 3;
  bytes executable_digest = 4;
  // The spawned Linux PID. Successful pairs require two distinct nonzero values.
  uint32 pid = 5;
}

message SpawnRealmChildrenResponse {
  d2b.common.v2.Outcome outcome = 1;
  string operation_id = 2;
  bytes launch_record_digest = 3;
  repeated SpawnedRealmChild children = 4;
  d2b.common.v2.ErrorEnvelope error = 5;
}
