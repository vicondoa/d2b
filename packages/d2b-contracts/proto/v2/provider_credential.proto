syntax = "proto3";
package d2b.provider.v2;
import "common.proto";
service CredentialProviderService {
  rpc Health(d2b.common.v2.ProviderRequest) returns (d2b.common.v2.ProviderResponse);
  rpc Status(d2b.common.v2.ProviderRequest) returns (d2b.common.v2.ProviderResponse);
  rpc AcquireLease(d2b.common.v2.ProviderRequest) returns (d2b.common.v2.ProviderResponse);
  rpc RefreshLease(d2b.common.v2.ProviderRequest) returns (d2b.common.v2.ProviderResponse);
  rpc RevokeLease(d2b.common.v2.ProviderRequest) returns (d2b.common.v2.ProviderResponse);
}
