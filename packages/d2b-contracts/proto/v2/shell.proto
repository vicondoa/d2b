syntax = "proto3";
package d2b.shell.v2;
import "common.proto";
service ShellService {
  rpc Create(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc Attach(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc Detach(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc List(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc Inspect(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc Kill(d2b.common.v2.ServiceRequest) returns (d2b.common.v2.ServiceResponse);
  rpc Cancel(d2b.common.v2.CancelRequest) returns (d2b.common.v2.CancelResponse);
}
