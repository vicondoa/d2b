[workspace]

[package]
name = "d2b-wlproxy-spike"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
publish = false
description = "Wave 1 Lane A spike: wl-proxy feasibility under unsafe_code = forbid"

[dependencies]
# wl-proxy v0.1.2 - MIT OR Apache-2.0
# Enable xdg_shell feature for set_app_id interception and niri window-rule support.
# Enable security_context_v1 for host-compositor security context filtering.
# Minimal feature set: only the protocols we intend to filter.
wl-proxy = { version = "0.1.2", features = [
    "protocol-xdg_shell",
    "protocol-security_context_v1",
    "protocol-linux_dmabuf_v1",
] }
log = "0.4"

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = "warn"
