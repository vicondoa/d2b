[package]
name = "d2b-daemon-access"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
publish = false
license.workspace = true

[lib]
doctest = false

[lints]
workspace = true

# Transport-neutral CLI<->d2bd semantic API + the local Unix binding
# (ADR 0032). Reproduces current CLI->daemon behavior over the existing
# public.sock wire (delegates to d2b-contracts public-wire types; no new
# wire). relay/direct_tls are declared-but-unimplemented slots.
[dependencies]
d2b-realm-core = { workspace = true }
d2b-realm-provider = { workspace = true }
d2b-client = { workspace = true, default-features = false, features = ["host-socket"] }
d2b-contracts = { workspace = true, features = ["public"] }
d2b-core = { workspace = true }
async-trait.workspace = true
nix = { version = "0.29", default-features = false, features = ["socket", "user"] }
serde.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = ["io-util", "net", "rt"] }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt"] }
