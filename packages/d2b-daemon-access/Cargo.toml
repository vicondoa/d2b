[package]
name = "d2b-daemon-access"
version = "0.0.0-bootstrap"
edition = "2024"
publish = false
license.workspace = true

[lib]
doctest = false

[lints]
workspace = true

# Transport-neutral CLI<->d2bd semantic API + the local Unix binding
# (ADR 0032). Reproduces current CLI->daemon behavior over the existing
# public.sock wire (delegates to d2b-contracts public-wire types; no new
# wire). relay/direct_tls are declared-but-unimplemented slots.
[dependencies]
d2b-constellation-core = { path = "../d2b-constellation-core", version = "0.0.0-bootstrap" }
d2b-constellation-provider = { path = "../d2b-constellation-provider", version = "0.0.0-bootstrap" }
d2b-contracts = { path = "../d2b-contracts", version = "0.0.0-bootstrap" }
async-trait = "0.1"
nix = { version = "0.29", default-features = false, features = ["socket"] }
serde.workspace = true
serde_json.workspace = true
tokio = { version = "1", features = ["io-util", "net", "rt"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
