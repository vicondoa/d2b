[package]
name = "d2b-realm-provider"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
publish = false
license.workspace = true

[lib]
doctest = false

[lints]
workspace = true

# Provider traits + typed capability descriptors (ADR 0032). Depends only
# on the codec-neutral `d2b-realm-core` and `async-trait`.
# MUST NOT depend on `prost`/codec crates, transport crates, or host-only
# broker/daemon internals (dependency-direction gate).
[dependencies]
d2b-realm-core = { workspace = true }
async-trait.workspace = true
serde.workspace = true
schemars.workspace = true
# Transport sessions/streams carry real bidirectional bytes (the mock
# loopback and later relay sessions implement AsyncRead/AsyncWrite). Only
# the io traits are needed here; no runtime/network features.
tokio = { workspace = true, default-features = false, features = ["io-util"] }
tracing = "0.1"

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt", "io-util"] }
serde_json = { workspace = true }
