[package]
name = "nixling-host"
version = "0.0.0-bootstrap"
edition = "2021"
publish = false
license.workspace = true

[lints]
workspace = true

# nixling-host is the W3 disjoint host-prepare API surface consumed by
# nixlingd and nixling-priv-broker. Stub modules land in the integrator
# prep commit; W3 scope agents s1-s4 fill them in.
#
# Dependency rule (per W3 file-ownership map): nixling-host depends only
# on nixling-core + nixling-ipc + low-level OS crates declared in the
# workspace. It must NEVER depend on nixlingd or nixling-priv-broker
# (both are downstream consumers).

[features]
default = []
# Opt-in test backends used by scope agents to drive fake/recorded I/O
# without touching the real netlink / cgroup / nft surfaces. Real
# implementations live behind the default build.
fake-backends = []

[dependencies]
nixling-core = { path = "../nixling-core", version = "0.0.0-bootstrap" }
nixling-ipc = { path = "../nixling-ipc", version = "0.0.0-bootstrap" }
serde.workspace = true
serde_json.workspace = true
schemars.workspace = true
rustix = { workspace = true }
# `nix` provides safe Uid/Gid constructors and a safe `fchown` wrapper
# that `rustix 0.38` only exposes through `unsafe`. nixling-host is
# `#![forbid(unsafe_code)]`, so the cgroup delegation chown path uses
# `nix::unistd::fchown` rather than `rustix::fs::fchown`. `nix` is
# already a transitive workspace dependency (broker + nixlingd), so
# this is not a new top-level supply-chain entry.
nix = { version = "0.29", default-features = false, features = ["fs", "user"] }
libc = "0.2"
sha2 = { workspace = true }
# `miniz_oxide` is a raw-DEFLATE decoder; nixling-host wraps it in a
# tiny inline gzip header/trailer skipper so the W3 kernel-module
# probe can read `/proc/config.gz` as a secondary kernel-config
# evidence source per plan.md §"W3 kernel-module probe order" step 4.
# Already in the workspace lockfile as a transitive of `backtrace`, so
# promoting it to a direct dependency does not widen the supply-chain
# surface tracked by cargo-deny + cargo-audit.
miniz_oxide = { version = "0.8", default-features = false, features = ["with-alloc"] }

[dev-dependencies]
nixling-core = { path = "../nixling-core", version = "0.0.0-bootstrap", features = ["test-support"] }
serde_json.workspace = true
tempfile = "3"
ttrpc = { version = "0.9.0", default-features = false, features = ["async"] }
